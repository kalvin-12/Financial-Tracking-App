<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - FinTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900 p-4">
    <div id="smooth-wrapper">
        <div id="smooth-content">
            <div class="card p-8 max-w-sm w-full text-center">
        <div class="w-20 h-20 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-wifi-slash text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Anda Sedang Offline</h1>
        <p class="text-slate-500 dark:text-slate-400 mb-8 text-sm">
            Maaf, halaman ini memerlukan koneksi internet untuk pertama kali dimuat. 
            Silakan periksa koneksi Anda dan coba lagi.
        </p>
        <button onclick="window.location.reload()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-blue-200">
            Coba Lagi
        </button>
        <a href="./index.html" class="block mt-4 text-blue-600 dark:text-blue-400 text-sm font-medium hover:underline">
            Kembali ke Dashboard
        </a>
    </div>
    </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://assets.codepen.io/16327/ScrollSmoother.min.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger, ScrollSmoother);
        let smoother = ScrollSmoother.create({
            smooth: 2,
            effects: true
        });
    </script>
</body>
</html>
